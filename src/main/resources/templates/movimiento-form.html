<!DOCTYPE html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layout}">

<div layout:fragment="contenido">

    <h1>Formulario Movimiento</h1>

    <form th:action="@{/movimientos/guardar}"
          th:object="${movimiento}"
          method="post">

        <input type="hidden"
               th:field="*{id}">

        <label>Tipo:</label>

        <select th:field="*{tipoMovimiento}">
            <option value="ENTRADA">ENTRADA</option>
            <option value="SALIDA">SALIDA</option>
        </select>

        <br><br>

        <label>Cantidad:</label>
        <input type="number"
               th:field="*{cantidad}">
        <br><br>

        <label>Fecha:</label>
        <input type="text"
               th:field="*{fecha}">
        <br><br>

        <label>Observación:</label>
        <input type="text"
               th:field="*{observacion}">
        <br><br>

        <button type="submit">
            Guardar
        </button>

    </form>

</div>

</html>
