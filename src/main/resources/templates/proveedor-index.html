<!DOCTYPE html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layout}">

<div layout:fragment="contenido">

    <h1>Lista de Proveedores</h1>

    <a th:href="@{/proveedores/nuevo}">
        Nuevo Proveedor
    </a>

    <br><br>

    <table>

        <thead>
        <tr>
            <th>ID</th>
            <th>RUC</th>
            <th>Empresa</th>
            <th>Teléfono</th>
            <th>Correo</th>
            <th>Dirección</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="proveedor : ${proveedores}">

            <td th:text="${proveedor.id}"></td>
            <td th:text="${proveedor.ruc}"></td>
            <td th:text="${proveedor.nombreEmpresa}"></td>
            <td th:text="${proveedor.telefono}"></td>
            <td th:text="${proveedor.correo}"></td>
            <td th:text="${proveedor.direccion}"></td>

            <td>

                <a th:href="@{/proveedores/editar/{id}(id=${proveedor.id})}">
                    Editar
                </a>

                |

                <a th:href="@{/proveedores/eliminar/{id}(id=${proveedor.id})}"
                   onclick="return confirm('¿Eliminar proveedor?')">
                    Eliminar
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</html>
